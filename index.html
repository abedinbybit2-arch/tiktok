<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Website Load Tester</title>
<style>
body{
    font-family:Arial;
    max-width:600px;
    margin:40px auto;
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}
#log{
    background:#111;
    color:#0f0;
    padding:10px;
    height:250px;
    overflow:auto;
}
</style>
</head>
<body>

<h2>Website Load Tester</h2>

<input type="text" id="url" placeholder="https://example.com">

<input type="number" id="rps" value="20">

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="log"></div>

<script>
let timer;

function log(text){
    document.getElementById("log").innerHTML += text+"<br>";
}

function start(){

    stop();

    const url=document.getElementById("url").value;
    const rps=parseInt(document.getElementById("rps").value);

    timer=setInterval(()=>{

        for(let i=0;i<rps;i++){

            fetch(url+"?t="+Date.now()+Math.random(),{
                cache:"no-store",
                mode:"no-cors"
            }).then(()=>{
                log("✔ Request Sent");
            }).catch(()=>{
                log("✖ Failed");
            });

        }

    },1000);

}

function stop(){
    clearInterval(timer);
}
</script>

</body>
</html>
